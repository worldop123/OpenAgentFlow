version: '3.8'

services:
  openagentflow:
    build: .
    container_name: openagentflow
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY:-}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET:-}
      - WECOM_CORP_ID=${WECOM_CORP_ID:-}
      - WECOM_CORP_SECRET=${WECOM_CORP_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openagentflow-net

  postgres:
    image: postgres:15-alpine
    container_name: openagentflow-postgres
    environment:
      - POSTGRES_USER=openagentflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openagentflow123}
      - POSTGRES_DB=openagentflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - openagentflow-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openagentflow-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - openagentflow-net
    restart: unless-stopped



  nginx:
    image: nginx:alpine
    container_name: openagentflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - openagentflow
    networks:
      - openagentflow-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  openagentflow-net:
    driver: bridge